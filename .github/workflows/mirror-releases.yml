name: Mirror Releases to ROCm/FastFlowLM

on:
  release:
    types: [published, edited]
  workflow_dispatch:
    inputs:
      backfill:
        description: 'Backfill ALL existing releases (one-time)'
        type: boolean
        default: false

concurrency:
  group: mirror-releases
  cancel-in-progress: false

jobs:
  mirror-releases:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Mint token for the target repo
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.MIRROR_APP_ID }}
          private-key: ${{ secrets.MIRROR_APP_PRIVATE_KEY }}
          owner: ROCm
          repositories: FastFlowLM

      - name: Mirror release(s)
        env:
          SRC: ${{ github.repository }}
          DST: ROCm/FastFlowLM
          SRC_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DST_TOKEN: ${{ steps.app-token.outputs.token }}
          EVENT: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          BACKFILL: ${{ github.event.inputs.backfill }}
        run: |
          set -euo pipefail

          # Which tags to mirror?
          if [ "$EVENT" = "release" ]; then
            TAGS="$RELEASE_TAG"
            MODE="upsert"          # re-mirror to pick up edits
          elif [ "$BACKFILL" = "true" ]; then
            TAGS="$(GH_TOKEN=$SRC_TOKEN gh api "repos/$SRC/releases" --paginate \
                     --jq '.[] | select(.draft==false) | .tag_name')"
            MODE="skip-existing"   # idempotent re-runs, no 2GB re-upload
          else
            echo "workflow_dispatch without backfill=true; nothing to do."
            exit 0
          fi

          # The source's current 'latest' release — mirror that flag faithfully.
          LATEST_TAG="$(GH_TOKEN=$SRC_TOKEN gh api "repos/$SRC/releases/latest" \
                         --jq '.tag_name' 2>/dev/null || echo '')"

          for TAG in $TAGS; do
            echo "::group::Mirroring $TAG"

            META="$(GH_TOKEN=$SRC_TOKEN gh api "repos/$SRC/releases/tags/$TAG")"
            IS_DRAFT="$(echo "$META"      | jq -r '.draft')"
            IS_PRERELEASE="$(echo "$META" | jq -r '.prerelease')"
            NAME="$(echo "$META"          | jq -r '.name // .tag_name')"
            if [ "$IS_DRAFT" = "true" ]; then echo "draft, skipping"; echo "::endgroup::"; continue; fi

            EXISTS="no"
            if GH_TOKEN=$DST_TOKEN gh release view "$TAG" --repo "$DST" >/dev/null 2>&1; then EXISTS="yes"; fi
            if [ "$EXISTS" = "yes" ] && [ "$MODE" = "skip-existing" ]; then
              echo "already on target, skipping"; echo "::endgroup::"; continue
            fi
            if [ "$EXISTS" = "yes" ]; then
              echo "exists — deleting for clean re-create"
              GH_TOKEN=$DST_TOKEN gh release delete "$TAG" --repo "$DST" --yes --cleanup-tag=false || true
            fi

            # Notes to a file to survive markdown/special chars.
            echo "$META" | jq -r '.body // ""' > /tmp/notes.md

            # Download assets (if any).
            rm -rf /tmp/rel && mkdir -p /tmp/rel
            if [ "$(echo "$META" | jq '.assets | length')" -gt 0 ]; then
              GH_TOKEN=$SRC_TOKEN gh release download "$TAG" --repo "$SRC" --dir /tmp/rel
            fi

            LATEST_FLAG="false"
            if [ "$TAG" = "$LATEST_TAG" ]; then LATEST_FLAG="true"; fi
            PRE_FLAG=""; if [ "$IS_PRERELEASE" = "true" ]; then PRE_FLAG="--prerelease"; fi

            # Create the release, then upload assets (glob may be empty).
            GH_TOKEN=$DST_TOKEN gh release create "$TAG" --repo "$DST" \
              --title "$NAME" --notes-file /tmp/notes.md \
              --latest="$LATEST_FLAG" $PRE_FLAG
            if [ -n "$(ls -A /tmp/rel 2>/dev/null)" ]; then
              GH_TOKEN=$DST_TOKEN gh release upload "$TAG" --repo "$DST" /tmp/rel/* --clobber
            fi

            echo "done: $TAG"
            echo "::endgroup::"
          done
